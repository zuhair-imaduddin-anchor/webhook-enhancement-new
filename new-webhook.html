<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future State: Webhook Event-Driven</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 30px; background-color: #f4f5f7; color: #333; }
        h1 { text-align: center; color: #28a745; }
        .grid { display: flex; gap: 30px; margin-top: 20px; }
        
        /* App UI */
        .app-container { flex: 1; display: flex; justify-content: center; }
        .mobile-app { width: 320px; height: 500px; background: white; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 12px solid #222; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; }
        .amount { font-size: 2em; font-weight: bold; margin: 20px 0; }
        .btn { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 1.1em; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }
        
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #28a745; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .counter-box { background: #d4edda; color: #155724; padding: 15px; border-radius: 8px; border: 2px solid #c3e6cb; margin-top: 20px; width: 80%; font-weight: bold; font-size: 1.2em; display: none; }
        .call-count { font-size: 1.8em; color: #28a745; }

        /* Backend Flow */
        .api-flow { flex: 1.5; background: #282c34; color: #abb2bf; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .backend-state { background: #3e4451; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 1.2em; color: #61afef; margin-bottom: 20px; border: 2px solid #5c6370; }
        .log-window { flex: 1; background: #1e2227; border-radius: 6px; padding: 15px; overflow-y: auto; font-family: monospace; font-size: 0.9em; max-height: 400px; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .log-webhook { color: #56b6c2; font-weight: bold; background: #2c313a; padding: 4px; border-left: 3px solid #56b6c2;}
        .log-state { color: #98c379; }
    </style>
</head>
<body>

    <h1>Future State: Event-Driven Architecture</h1>
    
    <div class="grid">
        <div class="app-container">
            <div class="mobile-app">
                <div style="font-weight: bold; color: #555;">Client Interface</div>
                <div class="amount">15.50 BTC</div>
                
                <button class="btn" id="startBtn" onclick="startWebhookSim()">Submit Transfer</button>
                
                <div class="spinner" id="spinner"></div>
                <div id="statusText" style="color: #666; margin-top: 10px; font-weight:bold;"></div>
                
                <div class="counter-box" id="counterBox">
                    API Calls Made:<br>
                    <span class="call-count" id="callCount">0</span><br>
                    <span style="font-size: 0.6em; color: #666;">(Waiting passively for webhook)</span>
                </div>
            </div>
        </div>

        <div class="api-flow">
            <h2 style="color: white; margin-top: 0; margin-bottom: 10px;">Backend Operations</h2>
            <div class="backend-state" id="backendState">Transfer State: PENDING</div>
            
            <div style="color: white; margin-bottom: 5px; font-weight: bold;">System Event Log:</div>
            <div class="log-window" id="logWindow"></div>
        </div>
    </div>

    <script>
        function addLog(text, type) {
            const log = document.getElementById('logWindow');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toISOString().split('T')[1].slice(0,-1);
            entry.innerText = `[${time}] ${text}`;
            log.prepend(entry);
        }

        function updateState(newState) {
            document.getElementById('backendState').innerText = `Transfer State: ${newState}`;
            addLog(`Backend state changed to: ${newState}`, 'log-state');
        }

        function startWebhookSim() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('counterBox').style.display = 'block';
            document.getElementById('statusText').innerText = "Listening for webhook...";
            
            document.getElementById('logWindow').innerHTML = '';
            addLog("Transfer submitted. Returned transferId: tx-999", 'log-state');

            // Simulate the backend slowly processing the transfer (NO client polling)
            setTimeout(() => updateState("PROCESSING"), 3000);
            setTimeout(() => updateState("BLOCKCHAIN_CONFIRMING"), 6000);
            setTimeout(() => {
                updateState("COMPLETED");
                
                // Boom: Webhook fires
                addLog(`[POST] Webhook transfer.completed fired! Payload includes: {"transferId": "tx-999"}`, 'log-webhook');
                
                // UI updates instantly upon receiving webhook
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('statusText').innerHTML = "<span style='color: #28a745; font-size: 1.2em;'>✓ Transfer Complete</span>";
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('startBtn').innerText = 'Reset Simulation';
                document.getElementById('startBtn').onclick = () => location.reload();
            }, 10000);
        }
    </script>
</body>
</html>
